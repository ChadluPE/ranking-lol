name: Update Riot Ranking

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update ranking data
        run: node scripts/update-ranking.mjs
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}

      - name: Commit ranking data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Riot ranking data"
          file_pattern: data/ranking.json data/ranking.js
